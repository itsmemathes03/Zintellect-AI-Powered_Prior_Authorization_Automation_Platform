version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: zintellect-db
    environment:
      POSTGRES_USER: zintellect
      POSTGRES_PASSWORD: zintellect
      POSTGRES_DB: zintellect
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zintellect"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: zintellect-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://zintellect:zintellect@db:5432/zintellect
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zintellect-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
